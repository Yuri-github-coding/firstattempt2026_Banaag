<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a6e">
    <title>Offline - Alumni Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a6e 0%, #2d5a9d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #333;
        }
        
        .offline-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .offline-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        
        h1 {
            color: #1e3a6e;
            font-size: 24px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .status {
            background: #fef3cd;
            border-left: 4px solid #c9a84c;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            text-align: left;
            font-size: 14px;
            color: #856404;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #1e3a6e;
            color: white;
        }
        
        .btn-primary:hover {
            background: #152844;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 58, 110, 0.3);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }
        
        .gold-accent {
            color: #c9a84c;
            font-weight: 600;
        }
        
        .tip {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 12px 16px;
            border-radius: 4px;
            margin-top: 24px;
            text-align: left;
            font-size: 13px;
            color: #1976D2;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        
        <h1>You're <span class="gold-accent">Offline</span></h1>
        
        <p>It looks like you've lost your internet connection. Some features may not be available right now.</p>
        
        <div class="status">
            <strong>Status:</strong> No internet connection detected
        </div>
        
        <div class="actions">
            <button class="btn-primary" onclick="tryReconnect()">
                Try Again
            </button>
            <button class="btn-secondary" onclick="goHome()">
                Go to Cached Pages
            </button>
        </div>
        
        <div class="tip">
            💡 <strong>Tip:</strong> You can still access previously visited pages that have been cached on your device.
        </div>
    </div>
    
    <script>
        // Check connection and retry
        function tryReconnect() {
            fetch('/').then(() => {
                // Connection restored
                location.reload();
            }).catch(() => {
                // Still offline
                alert('Still offline. Check your internet connection.');
            });
        }
        
        // Navigate to home/cached pages
        function goHome() {
            location.href = '/alumni/home';
        }
        
        // Auto-check connection every 5 seconds
        setInterval(() => {
            navigator.onLine && location.reload();
        }, 5000);
    </script>
</body>
</html>
